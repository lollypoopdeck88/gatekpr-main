    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GateKpr",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Modern HOA management software for self-managed communities and property management companies. Streamline payments, communications, and documents.",
      "url": "https://gatekpr.app",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Request a demo for custom pricing"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1",
        "bestRating": "5",
        "worstRating": "1"
      },
      "featureList": [
        "Online payment collection",
        "Document management",
        "Community announcements",
        "Resident directory",
        "Financial tracking",
        "Email notifications"
      ],
      "provider": {
        "@type": "Organization",
        "name": "GateKpr",

        "logo": "https://gatekpr.app/logo.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@gatekpr.app",
          "contactType": "sales"
        }
      }
    }

    <!-- Structured Data - FAQPage (for future FAQ section) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GateKpr",
      "url": "https://gatekpr.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://gatekpr.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Google Ads Conversion Tracking - Replace YOUR_CONVERSION_ID with actual ID -->
    <!-- Global site tag (gtag.js) - Google Ads -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-CONVERSION_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-CONVERSION_ID');
      
      // Google Ads conversion tracking function - call this on form submission
      window.trackConversion = function(conversionLabel) {
        if (typeof gtag === 'function') {
          gtag('event', 'conversion', {
            'send_to': 'AW-CONVERSION_ID/' + conversionLabel,
            'event_callback': function() {
              console.log('Conversion tracked:', conversionLabel);
            }
          });
        }
      };
    </script>
    
    <!-- Google Analytics 4 - Replace G-XXXXXXX with actual Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXX', {
        'page_title': document.title,
        'page_location': window.location.href
      });
    </script>
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />

  <body>
    <div id="root"></div>

    <!-- Google Ads Remarketing Tag -->
    <script>
      gtag('event', 'page_view', {
        'send_to': 'AW-CONVERSION_ID',
        'dynx_pagetype': 'home'
      });

    <!-- Noscript fallback for conversion tracking -->
    <noscript>
